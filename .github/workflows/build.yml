name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  GODOT_VERSION: "4.5"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            arch: x86_64
          - platform: windows
            os: windows-latest
            arch: x86_64
          - platform: macos
            os: macos-latest
            arch: universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SCons
        run: pip install scons

      - name: Build (template_debug)
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_debug

      - name: Build (template_release)
        run: scons platform=${{ matrix.platform }} arch=${{ matrix.arch }} target=template_release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-angelscript-${{ matrix.platform }}-${{ matrix.arch }}
          path: addons/godot-angelscript/bin/*

  smoke-test:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: godot-angelscript-linux-x86_64
          path: addons/godot-angelscript/bin

      - name: Download Godot
        run: |
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64

      - name: Import project
        run: ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path demo --import || true

      - name: Run smoke test
        run: ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path demo res://smoke.tscn

  vscode-extension:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install, typecheck, build, test
        working-directory: vscode
        run: |
          npm install
          npm run typecheck
          npm run build
          npm test
